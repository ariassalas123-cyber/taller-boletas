<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boletas — Taller de Reparación</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg-secondary: #f5f5f3; --bg-tertiary: #eeede9;
      --text: #1a1a1a; --text-secondary: #6b6b6b; --text-tertiary: #a0a0a0;
      --border: rgba(0,0,0,0.12); --border-md: rgba(0,0,0,0.22);
      --radius-md: 8px; --radius-lg: 12px; --accent: #1a1a1a; --accent-text: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1c; --bg-secondary: #262626; --bg-tertiary: #2e2e2e;
        --text: #f0f0f0; --text-secondary: #a0a0a0; --text-tertiary: #666;
        --border: rgba(255,255,255,0.1); --border-md: rgba(255,255,255,0.2);
        --accent: #f0f0f0; --accent-text: #1c1c1c;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-tertiary); color: var(--text); min-height: 100vh; }
    header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; gap: 12px; height: 56px; position: sticky; top: 0; z-index: 50; }
    header h1 { font-size: 16px; font-weight: 500; }
    header .subtitle { font-size: 13px; color: var(--text-tertiary); margin-left: auto; }
    .container { max-width: 820px; margin: 0 auto; padding: 1.5rem 1rem; }
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
    .tabs { display: flex; gap: 4px; background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 4px; margin-bottom: 1.25rem; }
    .tab { flex: 1; padding: 8px 12px; font-size: 13px; cursor: pointer; border: none; background: none; color: var(--text-secondary); border-radius: var(--radius-md); font-family: inherit; transition: background .15s, color .15s; }
    .tab.active { background: var(--bg); color: var(--text); font-weight: 500; border: 0.5px solid var(--border); }
    .view { display: none; } .view.active { display: block; }
    .section-title { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .6px; margin: 1.25rem 0 .75rem; padding-bottom: 6px; border-bottom: 0.5px solid var(--border); }
    .section-title:first-child { margin-top: 0; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 0.75rem; }
    .form-grid.full { grid-template-columns: 1fr; }
    .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
    @media (max-width: 560px) { .form-grid, .form-grid.three { grid-template-columns: 1fr; } }
    label { font-size: 12px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
    input, select, textarea { width: 100%; font-family: inherit; font-size: 14px; color: var(--text); background: var(--bg); border: 0.5px solid var(--border-md); border-radius: var(--radius-md); padding: 8px 10px; outline: none; transition: border-color .15s; }
    input:focus, select:focus, textarea:focus { border-color: var(--text-secondary); }
    textarea { resize: vertical; min-height: 80px; }
    .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; flex-wrap: wrap; }
    .btn-primary { background: var(--accent); color: var(--accent-text); border: none; padding: 9px 20px; border-radius: var(--radius-md); font-size: 14px; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-secondary { background: none; border: 0.5px solid var(--border-md); color: var(--text-secondary); padding: 9px 16px; border-radius: var(--radius-md); font-size: 14px; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px; }
    .btn-danger { background: none; border: 0.5px solid #f09595; color: #A32D2D; padding: 7px 14px; border-radius: var(--radius-md); font-size: 13px; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 5px; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 500; }
    .badge-Recibido           { background: #E6F1FB; color: #0C447C; }
    .badge-En-diagnostico     { background: #FAEEDA; color: #633806; }
    .badge-En-reparacion      { background: #EAF3DE; color: #27500A; }
    .badge-Esperando-repuesto { background: #FBEAF0; color: #72243E; }
    .badge-Resuelto           { background: #EEEDFE; color: #3C3489; }
    .badge-Entregado          { background: #F1EFE8; color: #444441; }
    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
    .filter-btn { padding: 5px 12px; border-radius: 100px; border: 0.5px solid var(--border-md); font-size: 12px; cursor: pointer; background: none; color: var(--text-secondary); font-family: inherit; white-space: nowrap; }
    .filter-btn.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    .boleta-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 8px; cursor: pointer; transition: border-color .15s; }
    .boleta-card:hover { border-color: var(--border-md); }
    .boleta-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; gap: 8px; }
    .boleta-num { font-weight: 500; font-size: 14px; }
    .boleta-meta, .boleta-equipo { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }
    .empty { text-align: center; padding: 3rem 0; color: var(--text-tertiary); font-size: 14px; }
    .empty i { font-size: 36px; display: block; margin-bottom: 8px; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: flex-start; justify-content: center; padding: 30px 1rem; overflow-y: auto; }
    .overlay.open { display: flex; }
    .detail-card { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); width: 100%; max-width: 580px; padding: 1.5rem; margin: auto; }
    .detail-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .close-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-secondary); padding: 4px; }
    .detail-row { display: flex; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 14px; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--text-secondary); min-width: 140px; font-size: 13px; flex-shrink: 0; }
    .status-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin: 8px 0 1rem; }
    @media (max-width: 480px) { .status-grid { grid-template-columns: 1fr 1fr; } }
    .status-opt { padding: 7px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); font-size: 12px; cursor: pointer; background: none; font-family: inherit; color: var(--text-secondary); text-align: center; transition: all .15s; }
    .status-opt.sel[data-s="Recibido"]            { background:#E6F1FB; color:#0C447C; border-color:#85B7EB; }
    .status-opt.sel[data-s="En diagnóstico"]      { background:#FAEEDA; color:#633806; border-color:#FAC775; }
    .status-opt.sel[data-s="En reparación"]       { background:#EAF3DE; color:#27500A; border-color:#97C459; }
    .status-opt.sel[data-s="Esperando repuesto"]  { background:#FBEAF0; color:#72243E; border-color:#ED93B1; }
    .status-opt.sel[data-s="Resuelto"]            { background:#EEEDFE; color:#3C3489; border-color:#AFA9EC; }
    .status-opt.sel[data-s="Entregado"]           { background:#F1EFE8; color:#444441; border-color:#B4B2A9; }
    .sync-info { font-size: 12px; color: var(--text-tertiary); margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--accent-text); padding: 10px 20px; border-radius: var(--radius-md); font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 300; white-space: nowrap; }
    .toast.show { opacity: 1; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(128,128,128,.3); border-top-color: var(--text); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -2px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Dashboard */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 10px; margin-bottom: 1.25rem; }
    .stat-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 1rem; }
    .stat-label { font-size: 12px; color: var(--text-tertiary); margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 500; }
    .stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .date-filter { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
    .date-filter label { font-size: 13px; color: var(--text-secondary); margin-bottom: 0; }
    .date-filter input { width: auto; font-size: 13px; padding: 6px 8px; }
    .bar-chart { margin-top: 1rem; }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
    .bar-label { min-width: 90px; color: var(--text-secondary); text-align: right; font-size: 11px; }
    .bar-track { flex: 1; background: var(--bg-secondary); border-radius: 4px; height: 20px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .4s; min-width: 2px; }
    .bar-val { min-width: 70px; font-size: 11px; color: var(--text-secondary); }

    /* Edit field inline */
    .edit-field { width: 100%; font-family: inherit; font-size: 14px; color: var(--text); background: var(--bg-secondary); border: 0.5px solid var(--border-md); border-radius: var(--radius-md); padding: 6px 8px; }
    .edit-actions { display: flex; gap: 6px; margin-top: 1rem; flex-wrap: wrap; }
  </style>
</head>
<body>
<header>
  <i class="ti ti-tools" style="font-size:20px" aria-hidden="true"></i>
  <h1>Taller de Reparación</h1>
  <span class="subtitle" id="header-date"></span>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="showTab('nueva',this)"><i class="ti ti-file-plus" aria-hidden="true"></i> Nueva</button>
    <button class="tab" onclick="showTab('lista',this)"><i class="ti ti-list" aria-hidden="true"></i> Boletas (<span id="count">—</span>)</button>
    <button class="tab" onclick="showTab('dashboard',this)"><i class="ti ti-chart-bar" aria-hidden="true"></i> Dashboard</button>
  </div>

  <!-- NUEVA BOLETA -->
  <div class="view active" id="view-nueva">
    <div class="card">
      <div class="section-title">Datos del cliente</div>
      <div class="form-grid">
        <div><label>Nombre completo *</label><input type="text" id="f-nombre" placeholder="Ej: Juan Pérez"></div>
        <div><label>Teléfono *</label><input type="text" id="f-tel" placeholder="Ej: 8888-8888"></div>
      </div>
      <div class="form-grid full">
        <div><label>Correo electrónico</label><input type="email" id="f-correo" placeholder="correo@ejemplo.com"></div>
      </div>
      <div class="section-title">Equipo</div>
      <div class="form-grid">
        <div><label>Marca *</label><input type="text" id="f-marca" placeholder="Ej: HP, Dell, Lenovo"></div>
        <div><label>Modelo</label><input type="text" id="f-modelo" placeholder="Ej: Pavilion 15"></div>
      </div>
      <div class="form-grid">
        <div><label>Número de serie</label><input type="text" id="f-serie" placeholder="S/N del equipo"></div>
        <div><label>Tipo de equipo</label>
          <select id="f-tipo">
            <option value="">Seleccionar...</option>
            <option>Laptop</option><option>Desktop / Torre</option><option>All-in-One</option><option>Tablet</option><option>Otro</option>
          </select>
        </div>
      </div>
      <div class="section-title">Diagnóstico y cobro</div>
      <div class="form-grid full">
        <div><label>Problema reportado por el cliente *</label>
          <textarea id="f-problema" placeholder="Describe el problema que reporta el cliente..."></textarea>
        </div>
      </div>
      <div class="form-grid">
        <div><label>Estado inicial</label>
          <select id="f-estado">
            <option value="Recibido">Recibido</option>
            <option value="En diagnóstico">En diagnóstico</option>
            <option value="En reparación">En reparación</option>
            <option value="Esperando repuesto">Esperando repuesto</option>
            <option value="Resuelto">Resuelto</option>
            <option value="Entregado">Entregado</option>
          </select>
        </div>
        <div><label>Presupuesto / Costo (₡)</label><input type="number" id="f-costo" placeholder="0" min="0"></div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="btn-guardar" onclick="guardarBoleta()">
          <i class="ti ti-device-floppy" aria-hidden="true"></i> Guardar boleta
        </button>
      </div>
    </div>
  </div>

  <!-- LISTA -->
  <div class="view" id="view-lista">
    <div class="sync-info">
      <i class="ti ti-refresh" aria-hidden="true"></i>
      <span id="sync-txt">Cargando...</span>
      <button class="btn-secondary" style="margin-left:auto;padding:5px 10px;font-size:12px" onclick="cargarBoletas()">
        <i class="ti ti-refresh" aria-hidden="true"></i> Actualizar
      </button>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filtrar(this,'')">Todas</button>
      <button class="filter-btn" onclick="filtrar(this,'Recibido')">Recibido</button>
      <button class="filter-btn" onclick="filtrar(this,'En diagnóstico')">En diagnóstico</button>
      <button class="filter-btn" onclick="filtrar(this,'En reparación')">En reparación</button>
      <button class="filter-btn" onclick="filtrar(this,'Esperando repuesto')">Esp. repuesto</button>
      <button class="filter-btn" onclick="filtrar(this,'Resuelto')">Resuelto</button>
      <button class="filter-btn" onclick="filtrar(this,'Entregado')">Entregado</button>
    </div>
    <div id="lista-container"><div class="empty"><i class="ti ti-loader"></i>Cargando boletas...</div></div>
  </div>

  <!-- DASHBOARD -->
  <div class="view" id="view-dashboard">
    <div class="card">
      <div class="section-title" style="margin-top:0">Filtro por fechas</div>
      <div class="date-filter">
        <label>Desde</label>
        <input type="date" id="d-desde">
        <label>Hasta</label>
        <input type="date" id="d-hasta">
        <button class="btn-secondary" style="padding:6px 14px;font-size:13px" onclick="renderDashboard()">
          <i class="ti ti-filter" aria-hidden="true"></i> Aplicar
        </button>
        <button class="btn-secondary" style="padding:6px 14px;font-size:13px" onclick="resetFiltro()">Todo</button>
      </div>
      <div class="stats-grid" id="dash-stats"></div>
      <div class="section-title">Ingresos por estado</div>
      <div class="bar-chart" id="dash-bars"></div>
      <div class="section-title">Boletas recientes en rango</div>
      <div id="dash-recientes"></div>
    </div>
  </div>
</div>

<!-- MODAL DETALLE / EDICIÓN -->
<div class="overlay" id="overlay" onclick="if(event.target===this)cerrarDetalle()">
  <div class="detail-card" id="detail-card"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwXuWVqCCTep7f0cdFxXkxUiyk-Kkz1sapiypI0D8Nfdpo4HpSgrNhujhPZvwi25Q2Ouw/exec";
const ESTADOS = ["Recibido","En diagnóstico","En reparación","Esperando repuesto","Resuelto","Entregado"];
let boletas = [];
let filtroActual = '';
let detailId = null;
let editMode = false;

// ID ZCR-XXXX
function nextId() {
  if (!boletas.length) return 'ZCR-0001';
  const nums = boletas.map(b => {
    const m = String(b.id).match(/(\d+)$/);
    return m ? parseInt(m[1]) : 0;
  });
  return 'ZCR-' + String(Math.max(...nums) + 1).padStart(4,'0');
}

document.getElementById('header-date').textContent =
  new Date().toLocaleDateString('es-CR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

// ── CARGAR ────────────────────────────────────────────────
async function cargarBoletas() {
  document.getElementById('sync-txt').textContent = 'Actualizando...';
  try {
    const r = await fetch(API + "?t=" + Date.now());
    const data = await r.json();
    boletas = data.map(b => ({
      id: b["ID"], fecha: b["Fecha"], nombre: b["Nombre"], tel: b["Teléfono"],
      correo: b["Correo"], marca: b["Marca"], modelo: b["Modelo"],
      serie: b["Serie"], tipo: b["Tipo"], problema: b["Problema"],
      diagnostico: b["Diagnostico"] || '', estado: b["Estado"], costo: b["Costo"]
    }));
    document.getElementById('count').textContent = boletas.length;
    document.getElementById('sync-txt').textContent = 'Sincronizado · ' + boletas.length + ' boleta' + (boletas.length!==1?'s':'');
    renderLista();
  } catch(e) {
    document.getElementById('sync-txt').textContent = 'Error al conectar';
    document.getElementById('lista-container').innerHTML =
      '<div class="empty"><i class="ti ti-wifi-off"></i>No se pudo conectar. Revisá tu conexión.</div>';
  }
}

// ── GUARDAR NUEVA ─────────────────────────────────────────
async function guardarBoleta() {
  const n=v('f-nombre'),tel=v('f-tel'),prob=v('f-problema'),marca=v('f-marca');
  if(!n||!tel||!prob||!marca){toast('Completá los campos obligatorios (*)');return;}
  const btn=document.getElementById('btn-guardar');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Guardando...';
  const b = {
    id: nextId(),
    fecha: new Date().toLocaleDateString('es-CR',{day:'2-digit',month:'2-digit',year:'numeric'}),
    nombre:n, tel, correo:v('f-correo'), marca, modelo:v('f-modelo'),
    serie:v('f-serie'), tipo:v('f-tipo'), problema:prob, diagnostico:'',
    estado:document.getElementById('f-estado').value, costo:v('f-costo')
  };
  try {
    const r = await fetch(API + "?action=save&data=" + encodeURIComponent(JSON.stringify(b)));
    const res = await r.json();
    if(res.ok){
      boletas.push(b);
      document.getElementById('count').textContent=boletas.length;
      limpiarForm(); toast('✓ Boleta '+b.id+' guardada');
    } else { toast('Error: '+res.error); }
  } catch(e) { toast('Error de conexión. Intentá de nuevo.'); }
  btn.disabled=false; btn.innerHTML='<i class="ti ti-device-floppy" aria-hidden="true"></i> Guardar boleta';
}

// ── ACTUALIZAR BOLETA ─────────────────────────────────────
async function actualizarBoleta(id, campos) {
  const b = boletas.find(x=>x.id===id);
  if(!b) return;
  Object.assign(b, campos);
  try {
    const r = await fetch(API + "?action=update&data=" + encodeURIComponent(JSON.stringify(b)));
    const res = await r.json();
    if(res.ok){ toast('✓ Boleta '+id+' actualizada'); renderLista(); }
    else { toast('Error al actualizar: '+(res.error||'desconocido')); }
  } catch(e) { toast('Error de conexión.'); }
}

// ── ELIMINAR ──────────────────────────────────────────────
async function eliminarBoleta(id) {
  if(!confirm('¿Eliminár la boleta '+id+'? Esta acción no se puede deshacer.')) return;
  try {
    const r = await fetch(API + "?action=delete&id=" + encodeURIComponent(id));
    const res = await r.json();
    if(res.ok){
      boletas = boletas.filter(x=>x.id!==id);
      document.getElementById('count').textContent=boletas.length;
      cerrarDetalle(); renderLista(); toast('Boleta '+id+' eliminada');
    } else { toast('Error al eliminar'); }
  } catch(e) { toast('Error de conexión.'); }
}

function v(id){return document.getElementById(id).value.trim();}

function limpiarForm(){
  ['f-nombre','f-tel','f-correo','f-marca','f-modelo','f-serie','f-costo','f-problema']
    .forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-tipo').selectedIndex=0;
  document.getElementById('f-estado').selectedIndex=0;
}

// ── TABS ──────────────────────────────────────────────────
function showTab(t,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-'+t).classList.add('active');
  if(t==='lista') cargarBoletas();
  if(t==='dashboard'){ cargarBoletas().then(()=>renderDashboard()); renderDashboard(); }
}

// ── FILTRO ────────────────────────────────────────────────
function filtrar(btn,f){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); filtroActual=f; renderLista();
}

// ── BADGE ─────────────────────────────────────────────────
function badgeClass(s){
  const m={'Recibido':'Recibido','En diagnóstico':'En-diagnostico','En reparación':'En-reparacion','Esperando repuesto':'Esperando-repuesto','Resuelto':'Resuelto','Entregado':'Entregado'};
  return 'badge badge-'+(m[s]||'Recibido');
}

// ── RENDER LISTA ──────────────────────────────────────────
function renderLista(){
  const c=document.getElementById('lista-container');
  const list=filtroActual?boletas.filter(b=>b.estado===filtroActual):boletas;
  if(!list.length){
    c.innerHTML='<div class="empty"><i class="ti ti-clipboard-off"></i>'+(boletas.length?'No hay boletas con ese estado':'Aún no hay boletas')+'</div>';
    return;
  }
  c.innerHTML=list.slice().reverse().map(b=>`
    <div class="boleta-card" onclick="abrirDetalle('${b.id}')">
      <div class="boleta-header">
        <span class="boleta-num"><i class="ti ti-file-text" style="font-size:14px;vertical-align:-2px;margin-right:4px" aria-hidden="true"></i>${b.id}</span>
        <span class="${badgeClass(b.estado)}">${b.estado||'Recibido'}</span>
      </div>
      <div class="boleta-meta"><i class="ti ti-user" style="font-size:13px;vertical-align:-2px;margin-right:4px" aria-hidden="true"></i>${b.nombre} · ${b.tel}</div>
      <div class="boleta-equipo"><i class="ti ti-device-laptop" style="font-size:13px;vertical-align:-2px;margin-right:4px" aria-hidden="true"></i>${b.marca}${b.modelo?' '+b.modelo:''} ${b.tipo?'· '+b.tipo:''} · <span style="color:var(--text-tertiary)">${b.fecha}</span>${b.costo?` · <strong>₡${Number(b.costo).toLocaleString('es-CR')}</strong>`:''}</div>
    </div>
  `).join('');
}

// ── DETALLE / EDICIÓN ─────────────────────────────────────
function abrirDetalle(id){
  const b=boletas.find(x=>x.id===id);
  if(!b)return;
  detailId=id; editMode=false;
  renderDetalle(b);
  document.getElementById('overlay').classList.add('open');
}

function renderDetalle(b){
  document.getElementById('detail-card').innerHTML=`
    <div class="detail-head">
      <div><strong>${b.id}</strong><span style="margin-left:10px;font-size:13px;color:var(--text-tertiary)">${b.fecha}</span></div>
      <div style="display:flex;gap:6px">
        <button class="btn-secondary" style="padding:5px 10px;font-size:12px" onclick="toggleEdit()"><i class="ti ti-edit" aria-hidden="true"></i> Editar</button>
        <button class="close-btn" onclick="cerrarDetalle()" aria-label="Cerrar"><i class="ti ti-x"></i></button>
      </div>
    </div>

    <div id="detalle-body">
      <div class="section-title" style="margin-top:0">Cliente</div>
      <div class="detail-row"><span class="detail-label">Nombre</span><span>${b.nombre}</span></div>
      <div class="detail-row"><span class="detail-label">Teléfono</span><span>${b.tel}</span></div>
      ${b.correo?`<div class="detail-row"><span class="detail-label">Correo</span><span>${b.correo}</span></div>`:''}

      <div class="section-title">Equipo</div>
      <div class="detail-row"><span class="detail-label">Marca / Modelo</span><span>${b.marca} ${b.modelo||''}</span></div>
      ${b.tipo?`<div class="detail-row"><span class="detail-label">Tipo</span><span>${b.tipo}</span></div>`:''}
      ${b.serie?`<div class="detail-row"><span class="detail-label">N° de serie</span><span>${b.serie}</span></div>`:''}

      <div class="section-title">Problema reportado</div>
      <div style="font-size:14px;color:var(--text-secondary);line-height:1.6;margin-bottom:.75rem">${b.problema}</div>

      <div class="section-title">Diagnóstico / Trabajo realizado</div>
      <div style="font-size:14px;color:var(--text-secondary);line-height:1.6;margin-bottom:.75rem">${b.diagnostico||'<em style="color:var(--text-tertiary)">Sin diagnóstico aún</em>'}</div>

      ${b.costo?`<div class="detail-row"><span class="detail-label">Costo</span><span style="font-weight:500">₡${Number(b.costo).toLocaleString('es-CR')}</span></div>`:''}

      <div class="section-title">Estado</div>
      <div class="status-grid">
        ${ESTADOS.map(s=>`<button class="status-opt${b.estado===s?' sel':''}" data-s="${s}" onclick="cambiarEstado('${s}')">${s}</button>`).join('')}
      </div>

      <div class="edit-actions">
        <button class="btn-primary" onclick="generarPDF('${b.id}')"><i class="ti ti-file-type-pdf" aria-hidden="true"></i> Generar PDF</button>
        <button class="btn-danger" onclick="eliminarBoleta('${b.id}')"><i class="ti ti-trash" aria-hidden="true"></i> Eliminar</button>
      </div>
    </div>
  `;
}

function renderEdicion(b){
  document.getElementById('detalle-body').innerHTML=`
    <div class="section-title" style="margin-top:0">Cliente</div>
    <div class="form-grid">
      <div><label>Nombre *</label><input class="edit-field" id="e-nombre" value="${b.nombre}"></div>
      <div><label>Teléfono *</label><input class="edit-field" id="e-tel" value="${b.tel}"></div>
    </div>
    <div class="form-grid full">
      <div><label>Correo</label><input class="edit-field" id="e-correo" value="${b.correo||''}"></div>
    </div>
    <div class="section-title">Equipo</div>
    <div class="form-grid">
      <div><label>Marca *</label><input class="edit-field" id="e-marca" value="${b.marca}"></div>
      <div><label>Modelo</label><input class="edit-field" id="e-modelo" value="${b.modelo||''}"></div>
    </div>
    <div class="form-grid">
      <div><label>N° de serie</label><input class="edit-field" id="e-serie" value="${b.serie||''}"></div>
      <div><label>Tipo</label>
        <select class="edit-field" id="e-tipo">
          ${['','Laptop','Desktop / Torre','All-in-One','Tablet','Otro'].map(t=>`<option${b.tipo===t?' selected':''}>${t}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="section-title">Problema y diagnóstico</div>
    <div class="form-grid full">
      <div><label>Problema reportado</label><textarea class="edit-field" id="e-problema" rows="3">${b.problema}</textarea></div>
    </div>
    <div class="form-grid full">
      <div><label>Diagnóstico / Trabajo realizado</label><textarea class="edit-field" id="e-diagnostico" rows="3" placeholder="Describí lo que hiciste...">${b.diagnostico||''}</textarea></div>
    </div>
    <div class="form-grid">
      <div><label>Estado</label>
        <select class="edit-field" id="e-estado">
          ${ESTADOS.map(s=>`<option${b.estado===s?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div><label>Costo (₡)</label><input class="edit-field" type="number" id="e-costo" value="${b.costo||''}"></div>
    </div>
    <div class="edit-actions">
      <button class="btn-primary" onclick="guardarEdicion('${b.id}')"><i class="ti ti-device-floppy" aria-hidden="true"></i> Guardar cambios</button>
      <button class="btn-secondary" onclick="toggleEdit()">Cancelar</button>
      <button class="btn-danger" onclick="eliminarBoleta('${b.id}')"><i class="ti ti-trash" aria-hidden="true"></i> Eliminar</button>
    </div>
  `;
}

function toggleEdit(){
  const b=boletas.find(x=>x.id===detailId);
  if(!b)return;
  editMode=!editMode;
  if(editMode) renderEdicion(b); else renderDetalle(b);
}

async function guardarEdicion(id){
  const campos = {
    nombre: document.getElementById('e-nombre').value.trim(),
    tel: document.getElementById('e-tel').value.trim(),
    correo: document.getElementById('e-correo').value.trim(),
    marca: document.getElementById('e-marca').value.trim(),
    modelo: document.getElementById('e-modelo').value.trim(),
    serie: document.getElementById('e-serie').value.trim(),
    tipo: document.getElementById('e-tipo').value,
    problema: document.getElementById('e-problema').value.trim(),
    diagnostico: document.getElementById('e-diagnostico').value.trim(),
    estado: document.getElementById('e-estado').value,
    costo: document.getElementById('e-costo').value.trim()
  };
  if(!campos.nombre||!campos.tel||!campos.marca){toast('Campos obligatorios vacíos');return;}
  await actualizarBoleta(id, campos);
  editMode=false;
  const b=boletas.find(x=>x.id===id);
  renderDetalle(b);
}

function cambiarEstado(s){
  const b=boletas.find(x=>x.id===detailId);
  if(!b)return;
  actualizarBoleta(detailId,{estado:s});
  b.estado=s;
  document.querySelectorAll('.status-opt').forEach(btn=>btn.classList.toggle('sel',btn.dataset.s===s));
}

function cerrarDetalle(){
  document.getElementById('overlay').classList.remove('open');
  detailId=null; editMode=false;
}

// ── PDF ───────────────────────────────────────────────────
function generarPDF(id){
  const b=boletas.find(x=>x.id===id);
  if(!b||!window.jspdf){toast('Error al generar PDF');return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210, pad=20;
  let y=pad;

  // Header
  doc.setFillColor(26,26,26);
  doc.rect(0,0,W,30,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text('Taller de Reparación',pad,13);
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text('Orden de servicio',pad,20);
  doc.setFontSize(12); doc.setFont('helvetica','bold');
  doc.text(b.id,W-pad,13,{align:'right'});
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text(b.fecha,W-pad,20,{align:'right'});

  y=40;
  doc.setTextColor(30,30,30);

  function seccion(titulo){
    doc.setFillColor(240,240,240);
    doc.rect(pad,y,W-2*pad,7,'F');
    doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.setTextColor(80,80,80);
    doc.text(titulo.toUpperCase(),pad+3,y+5);
    doc.setTextColor(30,30,30);
    y+=10;
  }

  function fila(label,val){
    if(!val&&val!==0)return;
    doc.setFontSize(10); doc.setFont('helvetica','bold');
    doc.text(label+':',pad,y);
    doc.setFont('helvetica','normal');
    const lines=doc.splitTextToSize(String(val),W-pad-60);
    doc.text(lines,pad+55,y);
    y+=7*lines.length;
  }

  seccion('Datos del cliente');
  fila('Nombre',b.nombre); fila('Teléfono',b.tel);
  if(b.correo) fila('Correo',b.correo);
  y+=3;

  seccion('Equipo');
  fila('Marca / Modelo',b.marca+(b.modelo?' '+b.modelo:''));
  if(b.tipo) fila('Tipo',b.tipo);
  if(b.serie) fila('N° de serie',b.serie);
  y+=3;

  seccion('Problema reportado');
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  const pLines=doc.splitTextToSize(b.problema||'—',W-2*pad);
  doc.text(pLines,pad,y); y+=7*pLines.length+5;

  if(b.diagnostico){
    seccion('Diagnóstico / Trabajo realizado');
    const dLines=doc.splitTextToSize(b.diagnostico,W-2*pad);
    doc.text(dLines,pad,y); y+=7*dLines.length+5;
  }

  seccion('Estado y costo');
  fila('Estado',b.estado);
  if(b.costo) fila('Costo',`₡${Number(b.costo).toLocaleString('es-CR')}`);
  y+=10;

  // Footer
  doc.setDrawColor(200,200,200);
  doc.line(pad,y,W-pad,y); y+=8;
  doc.setFontSize(9); doc.setTextColor(150,150,150);
  doc.text('Documento generado el '+new Date().toLocaleDateString('es-CR'),pad,y);
  doc.text('Gracias por su preferencia',W-pad,y,{align:'right'});

  doc.save('Boleta-'+b.id+'.pdf');
  toast('PDF generado: Boleta-'+b.id+'.pdf');
}

// ── DASHBOARD ─────────────────────────────────────────────
function resetFiltro(){
  document.getElementById('d-desde').value='';
  document.getElementById('d-hasta').value='';
  renderDashboard();
}

function parseFecha(f){
  if(!f)return null;
  const p=f.split('/');
  if(p.length===3) return new Date(p[2],p[1]-1,p[0]);
  return new Date(f);
}

function renderDashboard(){
  const desde=document.getElementById('d-desde')?.value;
  const hasta=document.getElementById('d-hasta')?.value;
  let lista=[...boletas];
  if(desde) lista=lista.filter(b=>{ const d=parseFecha(b.fecha); return d&&d>=new Date(desde); });
  if(hasta) lista=lista.filter(b=>{ const d=parseFecha(b.fecha); return d&&d<=new Date(hasta+'T23:59:59'); });

  const total=lista.length;
  const ingresos=lista.reduce((s,b)=>s+Number(b.costo||0),0);
  const entregadas=lista.filter(b=>b.estado==='Entregado').length;
  const pendientes=lista.filter(b=>b.estado!=='Entregado'&&b.estado!=='Resuelto').length;

  document.getElementById('dash-stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">Total boletas</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Ingresos</div><div class="stat-value" style="font-size:16px">₡${ingresos.toLocaleString('es-CR')}</div></div>
    <div class="stat-card"><div class="stat-label">Entregadas</div><div class="stat-value">${entregadas}</div></div>
    <div class="stat-card"><div class="stat-label">En proceso</div><div class="stat-value">${pendientes}</div></div>
  `;

  // Barras por estado
  const maxIng=Math.max(1,...ESTADOS.map(s=>lista.filter(b=>b.estado===s).reduce((sum,b)=>sum+Number(b.costo||0),0)));
  document.getElementById('dash-bars').innerHTML=ESTADOS.map(s=>{
    const cnt=lista.filter(b=>b.estado===s);
    const ing=cnt.reduce((sum,b)=>sum+Number(b.costo||0),0);
    const pct=Math.round(ing/maxIng*100);
    return `<div class="bar-row">
      <span class="bar-label">${s}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      <span class="bar-val">₡${ing.toLocaleString('es-CR')} (${cnt.length})</span>
    </div>`;
  }).join('');

  // Recientes
  const recientes=lista.slice().reverse().slice(0,8);
  document.getElementById('dash-recientes').innerHTML=recientes.length?recientes.map(b=>`
    <div class="boleta-card" onclick="abrirDetalle('${b.id}')">
      <div class="boleta-header">
        <span class="boleta-num">${b.id}</span>
        <span class="${badgeClass(b.estado)}">${b.estado}</span>
      </div>
      <div class="boleta-meta">${b.nombre} · ${b.fecha}${b.costo?` · ₡${Number(b.costo).toLocaleString('es-CR')}`:''}</div>
    </div>
  `).join(''):'<div class="empty" style="padding:1rem">Sin boletas en ese rango</div>';
}

// ── TOAST ─────────────────────────────────────────────────
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

cargarBoletas();
</script>
