<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boletas — Taller de Reparación</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary: #eeede9;
      --text: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-tertiary: #a0a0a0;
      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --accent: #1a1a1a;
      --accent-text: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1c;
        --bg-secondary: #262626;
        --bg-tertiary: #2e2e2e;
        --text: #f0f0f0;
        --text-secondary: #a0a0a0;
        --text-tertiary: #666;
        --border: rgba(255,255,255,0.1);
        --border-md: rgba(255,255,255,0.2);
        --accent: #f0f0f0;
        --accent-text: #1c1c1c;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-tertiary);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    header h1 {
      font-size: 16px;
      font-weight: 500;
    }

    header .subtitle {
      font-size: 13px;
      color: var(--text-tertiary);
      margin-left: auto;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }

    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }

    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 4px;
      margin-bottom: 1.25rem;
    }

    .tab {
      flex: 1;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-secondary);
      border-radius: var(--radius-md);
      font-family: inherit;
      transition: background .15s, color .15s;
    }

    .tab.active {
      background: var(--bg);
      color: var(--text);
      font-weight: 500;
      border: 0.5px solid var(--border);
    }

    .view { display: none; }
    .view.active { display: block; }

    .section-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin: 1.25rem 0 .75rem;
      padding-bottom: 6px;
      border-bottom: 0.5px solid var(--border);
    }

    .section-title:first-child { margin-top: 0; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 0.75rem;
    }

    .form-grid.full { grid-template-columns: 1fr; }

    @media (max-width: 500px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    label {
      font-size: 12px;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 4px;
    }

    input, select, textarea {
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      padding: 8px 10px;
      outline: none;
      transition: border-color .15s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--text-secondary);
    }

    textarea { resize: vertical; min-height: 80px; }

    .btn-row {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 1.25rem;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-text);
      border: none;
      padding: 9px 20px;
      border-radius: var(--radius-md);
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    .btn-secondary {
      background: none;
      border: 0.5px solid var(--border-md);
      color: var(--text-secondary);
      padding: 9px 16px;
      border-radius: var(--radius-md);
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-danger {
      background: none;
      border: 0.5px solid #f09595;
      color: #A32D2D;
      padding: 7px 14px;
      border-radius: var(--radius-md);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge-Pendiente         { background: #FAEEDA; color: #633806; }
    .badge-En-proceso        { background: #E6F1FB; color: #0C447C; }
    .badge-Listo             { background: #EAF3DE; color: #27500A; }
    .badge-Entregado         { background: #F1EFE8; color: #444441; }

    .filter-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .filter-btn {
      padding: 5px 12px;
      border-radius: 100px;
      border: 0.5px solid var(--border-md);
      font-size: 13px;
      cursor: pointer;
      background: none;
      color: var(--text-secondary);
      font-family: inherit;
    }

    .filter-btn.active {
      background: var(--accent);
      color: var(--accent-text);
      border-color: var(--accent);
    }

    .boleta-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color .15s;
    }

    .boleta-card:hover { border-color: var(--border-md); }

    .boleta-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .boleta-num { font-weight: 500; font-size: 15px; }

    .boleta-meta, .boleta-equipo {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 3px;
    }

    .empty {
      text-align: center;
      padding: 3rem 0;
      color: var(--text-tertiary);
      font-size: 14px;
    }

    .empty i { font-size: 36px; display: block; margin-bottom: 8px; }

    /* Modal */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 1rem;
    }

    .overlay.open { display: flex; }

    .detail-card {
      background: var(--bg);
      border-radius: var(--radius-lg);
      border: 0.5px solid var(--border);
      width: 100%;
      max-width: 520px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .detail-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .close-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: var(--text-secondary);
      padding: 4px;
    }

    .detail-row {
      display: flex;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 0.5px solid var(--border);
      font-size: 14px;
    }

    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--text-secondary); min-width: 130px; font-size: 13px; }

    .status-select {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0 1rem;
    }

    .status-opt {
      padding: 6px 14px;
      border-radius: 100px;
      border: 0.5px solid var(--border-md);
      font-size: 13px;
      cursor: pointer;
      background: none;
      font-family: inherit;
      color: var(--text-secondary);
    }

    .status-opt.sel[data-s="Pendiente"]         { background:#FAEEDA; color:#633806; border-color:#FAC775; }
    .status-opt.sel[data-s="En proceso"]        { background:#E6F1FB; color:#0C447C; border-color:#85B7EB; }
    .status-opt.sel[data-s="Listo para entrega"]{ background:#EAF3DE; color:#27500A; border-color:#97C459; }
    .status-opt.sel[data-s="Entregado"]         { background:#F1EFE8; color:#444441; border-color:#B4B2A9; }

    .sync-info {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: var(--accent-text);
      padding: 10px 20px;
      border-radius: var(--radius-md);
      font-size: 14px;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
      z-index: 300;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: -2px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <i class="ti ti-tools" style="font-size:20px" aria-hidden="true"></i>
  <h1>Taller de Reparación</h1>
  <span class="subtitle" id="header-date"></span>
</header>

<div class="container">

  <div class="tabs">
    <button class="tab active" onclick="showTab('nueva', this)">
      <i class="ti ti-file-plus" aria-hidden="true"></i> Nueva boleta
    </button>
    <button class="tab" onclick="showTab('lista', this)">
      <i class="ti ti-list" aria-hidden="true"></i> Boletas (<span id="count">—</span>)
    </button>
  </div>

  <!-- NUEVA BOLETA -->
  <div class="view active" id="view-nueva">
    <div class="card">
      <div class="section-title">Datos del cliente</div>
      <div class="form-grid">
        <div><label>Nombre completo *</label><input type="text" id="f-nombre" placeholder="Ej: Juan Pérez"></div>
        <div><label>Teléfono *</label><input type="text" id="f-tel" placeholder="Ej: 8888-8888"></div>
      </div>
      <div class="form-grid full">
        <div><label>Correo electrónico</label><input type="email" id="f-correo" placeholder="correo@ejemplo.com"></div>
      </div>

      <div class="section-title">Equipo</div>
      <div class="form-grid">
        <div><label>Marca *</label><input type="text" id="f-marca" placeholder="Ej: HP, Dell, Lenovo"></div>
        <div><label>Modelo</label><input type="text" id="f-modelo" placeholder="Ej: Pavilion 15"></div>
      </div>
      <div class="form-grid">
        <div><label>Número de serie</label><input type="text" id="f-serie" placeholder="S/N del equipo"></div>
        <div>
          <label>Tipo de equipo</label>
          <select id="f-tipo">
            <option value="">Seleccionar...</option>
            <option>Laptop</option>
            <option>Desktop / Torre</option>
            <option>All-in-One</option>
            <option>Tablet</option>
            <option>Otro</option>
          </select>
        </div>
      </div>

      <div class="section-title">Diagnóstico y cobro</div>
      <div class="form-grid full">
        <div><label>Problema reportado por el cliente *</label>
          <textarea id="f-problema" placeholder="Describe el problema que reporta el cliente..."></textarea>
        </div>
      </div>
      <div class="form-grid">
        <div>
          <label>Estado inicial</label>
          <select id="f-estado">
            <option value="Pendiente">Pendiente</option>
            <option value="En proceso">En proceso</option>
          </select>
        </div>
        <div><label>Presupuesto / Costo (₡)</label><input type="number" id="f-costo" placeholder="0" min="0"></div>
      </div>

      <div class="btn-row">
        <button class="btn-primary" id="btn-guardar" onclick="guardarBoleta()">
          <i class="ti ti-device-floppy" aria-hidden="true"></i> Guardar boleta
        </button>
      </div>
    </div>
  </div>

  <!-- LISTA -->
  <div class="view" id="view-lista">
    <div class="sync-info" id="sync-info">
      <i class="ti ti-refresh" aria-hidden="true"></i>
      <span id="sync-txt">Cargando desde Google Sheets...</span>
      <button class="btn-secondary" style="margin-left:auto;padding:4px 10px;font-size:12px" onclick="cargarBoletas()">
        <i class="ti ti-refresh" aria-hidden="true"></i> Actualizar
      </button>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filtrar(this,'')">Todas</button>
      <button class="filter-btn" onclick="filtrar(this,'Pendiente')">Pendientes</button>
      <button class="filter-btn" onclick="filtrar(this,'En proceso')">En proceso</button>
      <button class="filter-btn" onclick="filtrar(this,'Listo para entrega')">Listas</button>
      <button class="filter-btn" onclick="filtrar(this,'Entregado')">Entregadas</button>
    </div>
    <div id="lista-container">
      <div class="empty"><i class="ti ti-loader"></i>Cargando boletas...</div>
    </div>
  </div>

</div><!-- /container -->

<!-- MODAL DETALLE -->
<div class="overlay" id="overlay" onclick="if(event.target===this)cerrarDetalle()">
  <div class="detail-card" id="detail-card"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbwXuWVqCCTep7f0cdFxXkxUiyk-Kkz1sapiypI0D8Nfdpo4HpSgrNhujhPZvwi25Q2Ouw/exec";

  let boletas = [];
  let filtroActual = '';
  let detailId = null;
  let counter = 1;

  // Fecha en header
  document.getElementById('header-date').textContent =
    new Date().toLocaleDateString('es-CR', {weekday:'long', day:'2-digit', month:'long', year:'numeric'});

  // ── CARGAR ────────────────────────────────────────────────
  async function cargarBoletas() {
    document.getElementById('sync-txt').textContent = 'Actualizando...';
    try {
      const r = await fetch(API + "?t=" + Date.now());
      const data = await r.json();
      boletas = data.map(b => ({
        id: b["ID"], fecha: b["Fecha"], nombre: b["Nombre"],
        tel: b["Teléfono"], correo: b["Correo"], marca: b["Marca"],
        modelo: b["Modelo"], serie: b["Serie"], tipo: b["Tipo"],
        problema: b["Problema"], estado: b["Estado"], costo: b["Costo"]
      }));
      if (boletas.length)
        counter = Math.max(...boletas.map(b => Number(b.id) || 0)) + 1;
      document.getElementById('count').textContent = boletas.length;
      document.getElementById('sync-txt').textContent =
        'Sincronizado · ' + boletas.length + ' boleta' + (boletas.length !== 1 ? 's' : '');
      renderLista();
    } catch (e) {
      document.getElementById('sync-txt').textContent = 'Error al conectar con Google Sheets';
      document.getElementById('lista-container').innerHTML =
        '<div class="empty"><i class="ti ti-wifi-off"></i>No se pudo conectar. Revisá tu conexión.</div>';
    }
  }

  // ── GUARDAR ───────────────────────────────────────────────
  async function guardarBoleta() {
    const n = v('f-nombre'), tel = v('f-tel'), prob = v('f-problema'), marca = v('f-marca');
    if (!n || !tel || !prob || !marca) { toast('Completá los campos obligatorios (*)'); return; }

    const btn = document.getElementById('btn-guardar');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Guardando...';

    const b = {
      id: counter++,
      fecha: new Date().toLocaleDateString('es-CR', {day:'2-digit', month:'2-digit', year:'numeric'}),
      nombre: n, tel, correo: v('f-correo'),
      marca, modelo: v('f-modelo'), serie: v('f-serie'), tipo: v('f-tipo'),
      problema: prob,
      estado: document.getElementById('f-estado').value,
      costo: v('f-costo')
    };

    try {
      const r = await fetch(API + "?action=save&data=" + encodeURIComponent(JSON.stringify(b)));
      const res = await r.json();
      if (res.ok) {
        boletas.push(b);
        document.getElementById('count').textContent = boletas.length;
        limpiarForm();
        toast('✓ Boleta #' + b.id + ' guardada en Google Sheets');
      } else {
        toast('Error al guardar: ' + res.error);
        counter--;
      }
    } catch (e) {
      toast('Error de conexión. Intentá de nuevo.');
      counter--;
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-device-floppy" aria-hidden="true"></i> Guardar boleta';
  }

  function v(id) { return document.getElementById(id).value.trim(); }

  function limpiarForm() {
    ['f-nombre','f-tel','f-correo','f-marca','f-modelo','f-serie','f-costo','f-problema']
      .forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-tipo').selectedIndex = 0;
    document.getElementById('f-estado').selectedIndex = 0;
  }

  // ── TABS ──────────────────────────────────────────────────
  function showTab(t, btn) {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-' + t).classList.add('active');
    if (t === 'lista') cargarBoletas();
  }

  // ── FILTRO ────────────────────────────────────────────────
  function filtrar(btn, f) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filtroActual = f;
    renderLista();
  }

  // ── RENDER LISTA ──────────────────────────────────────────
  function badgeClass(s) {
    const m = { 'Pendiente':'Pendiente','En proceso':'En-proceso','Listo para entrega':'Listo','Entregado':'Entregado' };
    return 'badge badge-' + (m[s] || 'Pendiente');
  }

  function renderLista() {
    const c = document.getElementById('lista-container');
    const list = filtroActual ? boletas.filter(b => b.estado === filtroActual) : boletas;
    if (!list.length) {
      c.innerHTML = '<div class="empty"><i class="ti ti-clipboard-off"></i>' +
        (boletas.length ? 'No hay boletas con ese estado' : 'Aún no hay boletas registradas') + '</div>';
      return;
    }
    c.innerHTML = list.slice().reverse().map(b => `
      <div class="boleta-card" onclick="abrirDetalle(${b.id})">
        <div class="boleta-header">
          <span class="boleta-num"><i class="ti ti-file-text" style="font-size:15px;vertical-align:-2px;margin-right:4px" aria-hidden="true"></i>Boleta #${b.id}</span>
          <span class="${badgeClass(b.estado)}">${b.estado || 'Pendiente'}</span>
        </div>
        <div class="boleta-meta"><i class="ti ti-user" style="font-size:14px;vertical-align:-2px;margin-right:4px" aria-hidden="true"></i>${b.nombre} · ${b.tel}</div>
        <div class="boleta-equipo"><i class="ti ti-device-laptop" style="font-size:14px;vertical-align:-2px;margin-right:4px" aria-hidden="true"></i>${b.marca}${b.modelo ? ' ' + b.modelo : ''} ${b.tipo ? '· ' + b.tipo : ''} · <span style="color:var(--text-tertiary)">${b.fecha}</span></div>
      </div>
    `).join('');
  }

  // ── DETALLE ───────────────────────────────────────────────
  function abrirDetalle(id) {
    const b = boletas.find(x => Number(x.id) === Number(id));
    if (!b) return;
    detailId = id;
    document.getElementById('detail-card').innerHTML = `
      <div class="detail-head">
        <div><strong>Boleta #${b.id}</strong><span style="margin-left:10px;font-size:13px;color:var(--text-tertiary)">${b.fecha}</span></div>
        <button class="close-btn" onclick="cerrarDetalle()" aria-label="Cerrar"><i class="ti ti-x"></i></button>
      </div>
      <div class="section-title" style="margin-top:0">Cliente</div>
      <div class="detail-row"><span class="detail-label">Nombre</span><span>${b.nombre}</span></div>
      <div class="detail-row"><span class="detail-label">Teléfono</span><span>${b.tel}</span></div>
      ${b.correo ? `<div class="detail-row"><span class="detail-label">Correo</span><span>${b.correo}</span></div>` : ''}
      <div class="section-title">Equipo</div>
      <div class="detail-row"><span class="detail-label">Marca / Modelo</span><span>${b.marca} ${b.modelo || ''}</span></div>
      ${b.tipo ? `<div class="detail-row"><span class="detail-label">Tipo</span><span>${b.tipo}</span></div>` : ''}
      ${b.serie ? `<div class="detail-row"><span class="detail-label">N° de serie</span><span>${b.serie}</span></div>` : ''}
      <div class="section-title">Problema reportado</div>
      <div style="font-size:14px;color:var(--text-secondary);line-height:1.6;margin-bottom:1rem">${b.problema}</div>
      ${b.costo ? `<div class="detail-row"><span class="detail-label">Costo / Presupuesto</span><span style="font-weight:500">₡${Number(b.costo).toLocaleString('es-CR')}</span></div>` : ''}
      <div class="section-title">Estado</div>
      <div class="status-select">
        ${['Pendiente','En proceso','Listo para entrega','Entregado'].map(s =>
          `<button class="status-opt${String(b.estado) === s ? ' sel' : ''}" data-s="${s}" onclick="cambiarEstado('${s}')">${s}</button>`
        ).join('')}
      </div>
    `;
    document.getElementById('overlay').classList.add('open');
  }

  function cambiarEstado(s) {
    const b = boletas.find(x => Number(x.id) === Number(detailId));
    if (!b) return;
    b.estado = s;
    document.querySelectorAll('.status-opt').forEach(btn => btn.classList.toggle('sel', btn.dataset.s === s));
    toast('Estado actualizado a: ' + s);
    renderLista();
  }

  function cerrarDetalle() {
    document.getElementById('overlay').classList.remove('open');
    detailId = null;
  }

  // ── TOAST ─────────────────────────────────────────────────
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
